services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: visionx-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./visionx.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEBUG=false
    volumes:
      - backend_data:/app/data
      - trained_models:/app/trained_models
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: visionx-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_data:
  trained_models:
  backend_logs: