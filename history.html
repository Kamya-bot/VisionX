<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - VisionX</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        .history-item {
            padding: 1.5rem;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.75rem;
        }

        .history-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .history-meta {
            display: flex;
            gap: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-completed {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .filters-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="sidebar-logo">
                    <div class="logo-eye">
                        <div class="eye-outer">
                            <div class="eye-inner">
                                <div class="eye-pupil"></div>
                            </div>
                        </div>
                    </div>
                    <span class="logo-text">Vision<span class="gradient-text">X</span></span>
                </a>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="comparison.html" class="nav-link">
                    <i class="fas fa-plus-circle"></i>
                    <span>New Comparison</span>
                </a>
                <a href="history.html" class="nav-link active">
                    <i class="fas fa-history"></i>
                    <span>History</span>
                </a>
                <a href=analytics-dashboard.html class="nav-link">
                    <i class="fas fa-chart-bar"></i>
                    <span>Analytics</span>
                </a>
                <a href="profile.html" class="nav-link">
                    <i class="fas fa-user-circle"></i>
                    <span>Profile</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <button class="btn btn-secondary btn-full" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="topbar">
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
                
                <div class="topbar-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchHistory" placeholder="Search comparisons..." class="search-input">
                </div>
                
                <div class="topbar-actions">
                    <button class="icon-btn notification-btn">
                        <i class="fas fa-bell"></i>
                    </button>
                    
                    <div class="user-menu">
                        <button class="user-avatar">
                            <span id="userInitials">U</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="content-wrapper">
                <div class="page-header">
                    <div>
                        <h1>Prediction History</h1>
                        <p>View and manage all your ML predictions</p>
                    </div>
                    <a href="comparison.html" class="btn btn-primary">
                        <i class="fas fa-plus"></i> New Comparison
                    </a>
                </div>
                
                <div class="glass-card" style="padding: 2rem;">
                    <div class="filters-row">
                        <select id="filterCategory" class="form-input" style="max-width: 200px;">
                            <option value="">All Categories</option>
                            <option value="job">Job</option>
                            <option value="education">Education</option>
                            <option value="location">Location</option>
                            <option value="financial">Financial</option>
                            <option value="general">General</option>
                        </select>
                        
                        <select id="sortBy" class="form-input" style="max-width: 200px;">
                            <option value="recent">Most Recent</option>
                            <option value="confidence">Highest Confidence</option>
                            <option value="oldest">Oldest First</option>
                        </select>

                        <button id="refreshHistoryBtn" class="btn btn-secondary">
                            <i class="fas fa-sync"></i> Refresh
                        </button>
                    </div>
                    
                    <!-- Loading State -->
                    <div id="loadingHistory" style="text-align: center; padding: 3rem;">
                        <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: #4F8CFF;"></i>
                        <p style="margin-top: 1rem; color: var(--text-secondary);">Loading prediction history...</p>
                    </div>

                    <!-- History Items Container -->
                    <div id="historyContainer"></div>

                    <!-- Empty State -->
                    <div id="emptyState" class="empty-state" style="display: none;">
                        <i class="fas fa-history"></i>
                        <h3>No Predictions Yet</h3>
                        <p style="margin-bottom: 2rem;">Start by creating your first comparison</p>
                        <a href="comparison.html" class="btn btn-primary">
                            <i class="fas fa-plus"></i> Create Comparison
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="js/app.js"></script>
    <script src="js/api-config.js"></script>
    <script src="js/auth-handler.js"></script>
    <script src="js/history-real.js"></script>
</body>
</html>
