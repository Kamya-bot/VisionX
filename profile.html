<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - VisionX</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="sidebar-logo">
                    <div class="logo-eye">
                        <div class="eye-outer">
                            <div class="eye-inner">
                                <div class="eye-pupil"></div>
                            </div>
                        </div>
                    </div>
                    <span class="logo-text">Vision<span class="gradient-text">X</span></span>
                </a>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="comparison.html" class="nav-link">
                    <i class="fas fa-plus-circle"></i>
                    <span>New Comparison</span>
                </a>
                <a href="history.html" class="nav-link">
                    <i class="fas fa-history"></i>
                    <span>History</span>
                </a>
                <a href="results.html" class="nav-link">
                    <i class="fas fa-chart-bar"></i>
                    <span>Analytics</span>
                </a>
                <a href="profile.html" class="nav-link active">
                    <i class="fas fa-user-circle"></i>
                    <span>Profile</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <button class="btn btn-secondary btn-full" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="topbar">
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
                
                <div class="topbar-search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search..." class="search-input">
                </div>
                
                <div class="topbar-actions">
                    <button class="icon-btn notification-btn">
                        <i class="fas fa-bell"></i>
                    </button>
                    
                    <div class="user-menu">
                        <button class="user-avatar">
                            <span>JD</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="content-wrapper">
                <div class="page-header">
                    <div>
                        <h1>Profile & Settings</h1>
                        <p>Manage your account and preferences</p>
                    </div>
                </div>
                
                <div class="profile-container" style="max-width: 800px; margin: 0 auto;">
                    <!-- Profile Info -->
                    <div class="glass-card" style="padding: 2rem; margin-bottom: 1.5rem;">
                        <h3 style="margin-bottom: 1.5rem;">Personal Information</h3>
                        <div style="display: flex; flex-direction: column; gap: 1rem;">
                            <div class="form-group">
                                <label class="form-label">Full Name</label>
                                <input type="text" id="profileFullName" class="form-input" placeholder="Loading...">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Email</label>
                                <input type="email" id="profileEmail" class="form-input" placeholder="Loading..." readonly>
                            </div>
                            <div class="form-group">
                                <label class="form-label">User ID</label>
                                <input type="text" id="profileUserId" class="form-input" placeholder="Loading..." readonly style="opacity: 0.6;">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Behavioral Cluster</label>
                                <input type="text" id="profileCluster" class="form-input" placeholder="Loading..." readonly style="opacity: 0.6;">
                            </div>
                            <button class="btn btn-primary" id="saveProfileBtn">
                                <i class="fas fa-save"></i> Save Changes
                            </button>
                        </div>
                    </div>
                    
                    <!-- Preferences -->
                    <div class="glass-card" style="padding: 2rem; margin-bottom: 1.5rem;">
                        <h3 style="margin-bottom: 1.5rem;">Preferences</h3>
                        <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                            <label class="checkbox-label">
                                <input type="checkbox" checked>
                                <span class="checkbox-custom"></span>
                                <span>Email notifications for new comparisons</span>
                            </label>
                            
                            <label class="checkbox-label">
                                <input type="checkbox" checked>
                                <span class="checkbox-custom"></span>
                                <span>Weekly analytics summary</span>
                            </label>
                            
                            <label class="checkbox-label">
                                <input type="checkbox">
                                <span class="checkbox-custom"></span>
                                <span>Marketing emails</span>
                            </label>
                        </div>
                    </div>
                    
                    <!-- Theme -->
                    <div class="glass-card" style="padding: 2rem; margin-bottom: 1.5rem;">
                        <h3 style="margin-bottom: 1.5rem;">Appearance</h3>
                        <div class="form-group">
                            <label class="form-label">Theme</label>
                            <select class="form-input">
                                <option selected>Dark Mode (Current)</option>
                                <option>Light Mode</option>
                                <option>Auto</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Danger Zone -->
                    <div class="glass-card" style="padding: 2rem; border: 1px solid rgba(239, 68, 68, 0.3);">
                        <h3 style="margin-bottom: 1rem; color: #ef4444;">Danger Zone</h3>
                        <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">
                            Once you delete your account, there is no going back.
                        </p>
                        <button id="deleteAccountBtn" class="btn btn-secondary" style="border-color: #ef4444; color: #ef4444;">
                            <i class="fas fa-trash"></i> Delete Account
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="js/app.js"></script>
    
    <!-- Real Data Integration -->
    <script src="js/api-config.js"></script>
    <script src="js/auth-handler.js"></script>
    <script src="js/profile-real.js"></script>
</body>
</html>
