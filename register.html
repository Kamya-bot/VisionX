<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - VisionX</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-bg">
            <div class="gradient-orb orb-1"></div>
            <div class="gradient-orb orb-2"></div>
        </div>

        <div class="auth-branding">
            <a href="index.html" class="auth-logo">
                <div class="logo-eye">
                    <div class="eye-outer">
                        <div class="eye-inner">
                            <div class="eye-pupil"></div>
                        </div>
                    </div>
                </div>
                <span class="logo-text">Vision<span class="gradient-text">X</span></span>
            </a>
            <div class="branding-content">
                <h1>Start Your Journey</h1>
                <p>Make better decisions with data-driven intelligence</p>
                <div class="branding-features">
                    <div class="branding-feature">
                        <i class="fas fa-check-circle"></i>
                        <span>Free Forever Plan</span>
                    </div>
                    <div class="branding-feature">
                        <i class="fas fa-check-circle"></i>
                        <span>Unlimited Comparisons</span>
                    </div>
                    <div class="branding-feature">
                        <i class="fas fa-check-circle"></i>
                        <span>Advanced Analytics</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="auth-form-container">
            <div class="auth-card glass-card">
                <div class="auth-header">
                    <h2>Create Account</h2>
                    <p>Get started with VisionX in seconds</p>
                </div>

                <form class="auth-form" id="registerForm">
                    <div class="form-group">
                        <label class="form-label" for="name">Full Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" id="name" class="form-input" placeholder="Jane Smith">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="confirmPassword">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter your password">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>

                <div class="auth-divider">
                    <span>or sign up with</span>
                </div>

                <div class="social-login">
                    <button class="social-btn google-btn">
                        <i class="fab fa-google"></i>
                        <span>Google</span>
                    </button>
                    <button class="social-btn github-btn">
                        <i class="fab fa-github"></i>
                        <span>GitHub</span>
                    </button>
                </div>

                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script src="js/auth-handler.js"></script>
</body>
</html>
